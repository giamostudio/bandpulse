<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
  </defs>
  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Subtle border -->
  <rect width="512" height="512" rx="112" fill="none" stroke="#222" stroke-width="2"/>
  <!-- Pulse waveform centered -->
  <polyline
    points="72,256 136,256 168,160 200,340 232,196 264,296 296,256 360,256"
    fill="none" stroke="#E8FF47" stroke-width="18"
    stroke-linecap="round" stroke-linejoin="round"/>
  <!-- BP text below -->
  <text x="256" y="400" font-family="'Helvetica Neue',Arial,sans-serif"
    font-size="56" font-weight="900" fill="#E8FF47"
    text-anchor="middle" letter-spacing="6">BP</text>
</svg>
